name: Dependabot Updates

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  NODE_VERSION: '20.x'

jobs:
  validate-dependabot-update:
    name: Validate Dependabot Update
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check for Dependabot re-run
        if: github.run_attempt != '1'
        run: |
          echo "::error::Dependabot workflows cannot be re-run. Retrigger this update via Dependabot instead."
          echo "To retrigger this workflow:"
          echo "1. Comment '@dependabot recreate' on the PR to recreate it"
          echo "2. Or close and reopen the PR"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
