name: Pre-Deployment Gate

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment for deployment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '22.x'

jobs:
  # Phase 2: Static Analysis
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Linting
        run: npm run lint
      
      - name: Type Checking
        run: npx tsc --noEmit -p apps/api/tsconfig.json
      
      - name: Format Check
        run: npx prettier --check "apps/**/*.{ts,tsx,js,jsx}" "libs/**/*.{ts,tsx,js,jsx}"
      
      - name: Check for console.log statements
        run: |
          echo "Checking for console.log in production code..."
          if grep -r "console\.log" apps/api/src --include="*.ts" | grep -v "spec.ts" | grep -v "test.ts"; then
            echo "::warning::Found console.log statements in production code"
          fi

  # Phase 3: Security Vulnerability Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Dependency Vulnerabilities
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          npm audit --json > audit-results.json || true
          
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-results.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-results.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-results.json)
          LOW=$(jq '.metadata.vulnerabilities.low // 0' audit-results.json)
          
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | ${CRITICAL:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| High | ${HIGH:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Moderate | ${MODERATE:-0} |" >> $GITHUB_STEP_SUMMARY
          echo "| Low | ${LOW:-0} |" >> $GITHUB_STEP_SUMMARY
          
          if [ "${CRITICAL:-0}" -gt 0 ]; then
            echo "::error::Critical vulnerabilities found!"
            exit 1
          fi
      
      - name: Hardcoded Secrets Scan
          echo "Secrets scan complete."
          
          if [ "$SECRETS_FOUND" -gt 0 ]; then
            echo "::error::Security scan failed: potential secrets or cloud credentials detected."
            exit 1
          fi

  # Phase 4: Unit Testing with Coverage
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: questionnaire_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Generate Prisma Client
        run: npm run db:generate
      
      - name: Sync database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
        run: ./node_modules/.bin/prisma db push --skip-generate
      
      - name: Run API Tests with Coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
        run: |
          npm run test -- --filter=api
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "API tests completed" >> $GITHUB_STEP_SUMMARY
      
      - name: Run Web Tests
        run: npm run test -- --filter=web
      
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            apps/api/coverage/
            apps/web/coverage/
          retention-days: 7

  # Phase 8: Build Verification
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Generate Prisma Client
        run: npm run db:generate
      
      - name: Build All Packages
        run: |
          START_TIME=$(date +%s)
          npx turbo run build --filter=api --filter=database --filter=redis --filter=shared --filter=web
          END_TIME=$(date +%s)
          BUILD_TIME=$((END_TIME - START_TIME))
          
          echo "## Build Performance" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | ${BUILD_TIME}s | <300s | $([ $BUILD_TIME -lt 300 ] && echo '✅' || echo '⚠️') |" >> $GITHUB_STEP_SUMMARY
      
      - name: Verify Build Artifacts
        run: |
          echo "Checking build artifacts..."
          
          # Check API build
          if [ -d "dist/apps/api" ] || [ -d "apps/api/dist" ]; then
            echo "✅ API build artifacts present"
          else
            echo "::error::API build artifacts missing!"
            exit 1
          fi
          
          # Check Web build
          if [ -d "apps/web/dist" ]; then
            WEB_SIZE=$(du -sh apps/web/dist | cut -f1)
            echo "✅ Web build artifacts present (size: $WEB_SIZE)"
          else
            echo "::error::Web build artifacts missing!"
            exit 1
          fi
      
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            apps/web/dist/
          retention-days: 7

  # Phase 12: Docker Verification
  docker-verification:
    name: Docker Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build API Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/api/Dockerfile
          push: false
          tags: questionnaire-api:pre-deploy
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Verify Image Size
        run: |
          IMAGE_SIZE=$(docker images questionnaire-api:pre-deploy --format "{{.Size}}")
          echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "- Image Size: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY

  # Pre-Deployment Gate Summary
  pre-deployment-gate:
    name: Pre-Deployment Gate
    runs-on: ubuntu-latest
    needs: [static-analysis, security-scan, unit-tests, build-verification, docker-verification]
    if: always()
    steps:
      - name: Check All Gates
        run: |
          echo "## Pre-Deployment Gate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          FAILED=0
          
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          
          check_status() {
            if [ "$2" == "success" ]; then
              echo "| $1 | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $1 | ❌ FAIL |" >> $GITHUB_STEP_SUMMARY
              FAILED=1
            fi
          }
          
          check_status "Static Analysis" "${{ needs.static-analysis.result }}"
          check_status "Security Scan" "${{ needs.security-scan.result }}"
          check_status "Unit Tests" "${{ needs.unit-tests.result }}"
          check_status "Build Verification" "${{ needs.build-verification.result }}"
          check_status "Docker Verification" "${{ needs.docker-verification.result }}"
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ $FAILED -eq 0 ]; then
            echo "### ✅ DEPLOYMENT APPROVED" >> $GITHUB_STEP_SUMMARY
            echo "All pre-deployment gates passed. Ready to deploy." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ DEPLOYMENT BLOCKED" >> $GITHUB_STEP_SUMMARY
            echo "One or more pre-deployment gates failed. Fix issues before deployment." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
      
      - name: Generate Deployment Manifest
        if: success()
        run: |
          echo "deployment:" > deployment-manifest.yml
          echo "  version: ${{ github.sha }}" >> deployment-manifest.yml
          echo "  timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> deployment-manifest.yml
          echo "  environment: ${{ github.event.inputs.target_environment || 'staging' }}" >> deployment-manifest.yml
          echo "  gates_passed:" >> deployment-manifest.yml
          echo "    - static_analysis" >> deployment-manifest.yml
          echo "    - security_scan" >> deployment-manifest.yml
          echo "    - unit_tests" >> deployment-manifest.yml
          echo "    - build_verification" >> deployment-manifest.yml
          echo "    - docker_verification" >> deployment-manifest.yml
          
          cat deployment-manifest.yml
