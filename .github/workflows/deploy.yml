name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          
          if [ -z "$APP_URL" ]; then
            echo "❌ Deployment failed - could not resolve Container App URL"
            exit 1
          fi

          echo "Application URL: https://${APP_URL}"

          # Wait for app to be ready and retry health check
          ATTEMPT=1
          MAX_ATTEMPTS=10
          until [ "$ATTEMPT" -gt "$MAX_ATTEMPTS" ]; do
            HTTP_STATUS=$(curl --connect-timeout 5 --max-time 10 -s -o /dev/null -w "%{http_code}" "https://${APP_URL}${{ env.HEALTH_PATH }}" || true)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Deployment successful - Health check passed"
              echo "Application is available at: https://${APP_URL}"
              exit 0
            fi
            echo "Health check attempt ${ATTEMPT}/${MAX_ATTEMPTS} returned ${HTTP_STATUS}, retrying..."
            ATTEMPT=$((ATTEMPT + 1))
            sleep 15
          done

      - name: Notify failure
        if: failure()
        run: |
          echo "Deployment failed - health check did not return 200 after retries"