name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build Docker image
        run: |
          TAG=$(date +%Y%m%d%H%M%S)  # Generating a deterministic tag based on current date and time
          echo "TAG=${TAG}" >> $GITHUB_ENV
          IMAGE_NAME="myapp:${TAG}"
          docker build -t ${IMAGE_NAME} .
          echo "imageToDeploy=${IMAGE_NAME}" >> $GITHUB_ENV

    outputs:
      imageToDeploy: ${{ env.imageToDeploy }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy to Azure Container Apps
        uses: azure/azure-container-apps-deploy-action@v1
        with:
          registryUrl: ${{ secrets.REGISTRY_URL }}
          registryUsername: ${{ secrets.REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.REGISTRY_PASSWORD }}
          imageToDeploy: ${{ needs.build-docker.outputs.imageToDeploy }}
          summary: "Deploying image: ${{ needs.build-docker.outputs.imageToDeploy }}"