name: Deploy to Azure

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
        default: 'development'

env:
  NODE_VERSION: '22.x'
  REGISTRY_NAME: acrquestionnaireprod
  IMAGE_NAME: quiz-api
  RESOURCE_GROUP: rg-questionnaire-prod
  CONTAINER_APP_NAME: ca-questionnaire-api-prod
  HEALTH_PATH: /api/v1/health

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build libraries
        run: npx turbo run build --filter=database --filter=redis --filter=shared

      - name: Run unit tests
        run: npm run test -- --filter=api -- --passWithNoTests
        continue-on-error: true

      - name: Build application
        run: npx turbo run build --filter=api

  build-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event.inputs.environment != ''
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max
          target: production

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-docker
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate required deployment secrets
        id: secrets-check
        run: |
          MISSING=0
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::warning::Missing secret DATABASE_URL"
            MISSING=1
          fi
          if [ -z "${{ secrets.REDIS_HOST }}" ]; then
            echo "::warning::Missing secret REDIS_HOST"
            MISSING=1
          fi
          if [ -z "${{ secrets.JWT_SECRET }}" ]; then
            echo "::warning::Missing secret JWT_SECRET"
            MISSING=1
          fi
          if [ "$MISSING" -eq 1 ]; then
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set Container App secrets
        if: steps.secrets-check.outputs.deploy_enabled == 'true'
        run: |
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --secrets \
              database-url="${{ secrets.DATABASE_URL }}" \
              redis-host="${{ secrets.REDIS_HOST }}" \
              redis-port="${{ secrets.REDIS_PORT }}" \
              redis-password="${{ secrets.REDIS_PASSWORD }}" \
              jwt-secret="${{ secrets.JWT_SECRET }}" \
              jwt-refresh-secret="${{ secrets.JWT_REFRESH_SECRET }}" \
            --output none

      - name: Get image tag
        id: image-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Azure Container Apps
        if: steps.secrets-check.outputs.deploy_enabled == 'true'
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}
          registryUrl: ${{ env.REGISTRY_NAME }}.azurecr.io
          registryUsername: ${{ secrets.AZURE_ACR_USERNAME }}
          registryPassword: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Configure environment variables
        if: steps.secrets-check.outputs.deploy_enabled == 'true'
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars \
              "NODE_ENV=production" \
              "PORT=3000" \
              "API_PREFIX=api/v1" \
              "DATABASE_URL=secretref:database-url" \
              "REDIS_HOST=secretref:redis-host" \
              "REDIS_PORT=secretref:redis-port" \
              "REDIS_PASSWORD=secretref:redis-password" \
              "JWT_SECRET=secretref:jwt-secret" \
              "JWT_REFRESH_SECRET=secretref:jwt-refresh-secret"

      # Note: Database migrations should be run manually or at app startup
      # az containerapp exec doesn't work in CI (no TTY)

      - name: Verify deployment
        if: steps.secrets-check.outputs.deploy_enabled == 'true'
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          
          echo "Application URL: https://${APP_URL}"
          
          ATTEMPT=1
          MAX_ATTEMPTS=20
          until [ "$ATTEMPT" -gt "$MAX_ATTEMPTS" ]; do
            HTTP_STATUS=$(curl --connect-timeout 5 --max-time 10 -s -o /dev/null -w "%{http_code}" "https://${APP_URL}${{ env.HEALTH_PATH }}" || true)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Deployment successful - Health check passed"
              exit 0
            fi
            echo "Health check attempt ${ATTEMPT}/${MAX_ATTEMPTS} returned ${HTTP_STATUS}"
            ATTEMPT=$((ATTEMPT + 1))
            sleep 15
          done
          echo "Health check did not return 200 after ${MAX_ATTEMPTS} attempts"
          exit 1

      - name: Create deployment summary
        if: always()
        run: |
          # Get application URL for summary
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv 2>/dev/null || echo "unavailable")
          
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${APP_URL}" >> $GITHUB_STEP_SUMMARY
