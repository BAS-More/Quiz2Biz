name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Verify deployment
        run: |
          echo "Deployment successful - Health check passed"

      - name: Notify failure
        if: failure()
        run: |
          echo "Deployment failed - health check did not return 200 after retries"