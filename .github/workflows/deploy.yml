# This workflow deploys a Docker image

name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Build Docker image
        run: |
          TAG=${{ github.ref_name }}-${{ github.sha }}
          docker build -t myimage:$TAG .
          docker push myimage:$TAG

      - name: Set image reference
        id: image_ref
        run: |
          echo "imageToDeploy=myimage:$TAG" >> $GITHUB_ENV

  deploy:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Deploy Docker image
        run: |
          echo "Deploying image ${{ env.imageToDeploy }}"
          # Deployment commands here
