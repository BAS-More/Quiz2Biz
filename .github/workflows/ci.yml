name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  NODE_VERSION: '22.x'

jobs:
  lint-and-format:
    name: lint-and-format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check for Dependabot re-run
        if: github.actor == 'dependabot[bot]' && github.run_attempt != 1
        run: |
          echo "::error::Dependabot workflows cannot be re-run. Retrigger this update via Dependabot instead."
          echo "To retrigger this workflow:"
          echo "1. Comment '@dependabot recreate' on the PR to recreate it"
          echo "2. Or close and reopen the PR"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check code formatting (app and libs only)
        run: npx prettier --check "apps/**/*.{ts,tsx,js,jsx}" "libs/**/*.{ts,tsx,js,jsx}"

      - name: Run linter
        run: npm run lint

  test-api:
    name: test-api
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: questionnaire_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Check for Dependabot re-run
        if: github.actor == 'dependabot[bot]' && github.run_attempt != 1
        run: |
          echo "::error::Dependabot workflows cannot be re-run. Retrigger this update via Dependabot instead."
          echo "To retrigger this workflow:"
          echo "1. Comment '@dependabot recreate' on the PR to recreate it"
          echo "2. Or close and reopen the PR"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Sync database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
        run: ./node_modules/.bin/prisma db push --skip-generate

      - name: Run API tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
        run: |
          set -o pipefail
          npm run test -- --filter=api 2>&1 | tee test_run_results.log

      - name: Upload test run results log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-run-results-log
          path: test_run_results.log
          retention-days: 7

      - name: Upload API test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 7

  test-web:
    name: test-web
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check for Dependabot re-run
        if: github.actor == 'dependabot[bot]' && github.run_attempt != 1
        run: |
          echo "::error::Dependabot workflows cannot be re-run. Retrigger this update via Dependabot instead."
          echo "To retrigger this workflow:"
          echo "1. Comment '@dependabot recreate' on the PR to recreate it"
          echo "2. Or close and reopen the PR"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Web tests
        run: npm run test -- --filter=web

      - name: Upload Web test coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: apps/web/coverage/
          retention-days: 7

  test-regression:
    name: test-regression
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: questionnaire_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Sync database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
        run: ./node_modules/.bin/prisma db push --skip-generate

      - name: Run Regression tests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
        run: npm run test:regression

  test-e2e:
    name: test-e2e
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: questionnaire_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Check for Dependabot re-run
        if: github.actor == 'dependabot[bot]' && github.run_attempt != 1
        run: |
          echo "::error::Dependabot workflows cannot be re-run. Retrigger this update via Dependabot instead."
          echo "To retrigger this workflow:"
          echo "1. Comment '@dependabot recreate' on the PR to recreate it"
          echo "2. Or close and reopen the PR"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Sync database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
        run: ./node_modules/.bin/prisma db push --skip-generate

      - name: Build core packages
        run: npx turbo run build --filter=api --filter=database --filter=redis --filter=shared --filter=web

      - name: Start API server
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          CSRF_DISABLED: 'true'
        run: |
          node dist/apps/api/main.js &
          sleep 5
          curl -f http://localhost:3000/api/v1/health/live || exit 1

      - name: Start Web server
        run: |
          cd apps/web && npx vite preview --port 5173 &
          sleep 3

      - name: Run E2E tests
        env:
          PLAYWRIGHT_NO_WEBSERVER: '1'
          E2E_BASE_URL: http://localhost:5173
          API_URL: http://localhost:3000
        run: npx playwright test --reporter=html,json,junit

      - name: E2E Summary
        if: always()
        run: |
          echo "## E2E Tests" >> $GITHUB_STEP_SUMMARY
          if [ -f e2e/reports/junit-report.xml ]; then
            TESTS=$(grep -c 'testcase' e2e/reports/junit-report.xml || echo "0")
            FAILURES=$(grep -c 'failure' e2e/reports/junit-report.xml || echo "0")
            echo "| Total | Failures |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| ${TESTS} | ${FAILURES} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "No E2E report generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/reports/
          retention-days: 7

  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check for Dependabot re-run
        if: github.actor == 'dependabot[bot]' && github.run_attempt != 1
        run: |
          echo "::error::Dependabot workflows cannot be re-run. Retrigger this update via Dependabot instead."
          echo "To retrigger this workflow:"
          echo "1. Comment '@dependabot recreate' on the PR to recreate it"
          echo "2. Or close and reopen the PR"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Build core packages
        run: npx turbo run build --filter=api --filter=database --filter=redis --filter=shared --filter=web

      - name: Check build artifacts
        run: |
          echo "Checking build artifacts..."
          if [ ! -d "dist/apps/api" ] && [ ! -d "apps/api/dist" ]; then
            echo "❌ API build failed - no dist output found"
            exit 1
          fi
          if [ ! -d "apps/web/dist" ]; then
            echo "❌ Web build failed - apps/web/dist not found"
            exit 1
          fi
          echo "✅ All build artifacts present"

  docker-build-test:
    name: docker-build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check for Dependabot re-run
        if: github.actor == 'dependabot[bot]' && github.run_attempt != 1
        run: |
          echo "::error::Dependabot workflows cannot be re-run. Retrigger this update via Dependabot instead."
          echo "To retrigger this workflow:"
          echo "1. Comment '@dependabot recreate' on the PR to recreate it"
          echo "2. Or close and reopen the PR"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/api/Dockerfile
          push: false
          tags: questionnaire-api:test
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check for Dependabot re-run
        if: github.actor == 'dependabot[bot]' && github.run_attempt != 1
        run: |
          echo "::error::Dependabot workflows cannot be re-run. Retrigger this update via Dependabot instead."
          echo "To retrigger this workflow:"
          echo "1. Comment '@dependabot recreate' on the PR to recreate it"
          echo "2. Or close and reopen the PR"
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=high

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Run security scan script
        run: |
          if [ -f "./scripts/security-scan.sh" ]; then
            chmod +x ./scripts/security-scan.sh
            ./scripts/security-scan.sh
          else
            echo "Security scan script not found, skipping"
          fi
        continue-on-error: true

  all-checks-passed:
    name: all-checks-passed
    runs-on: ubuntu-latest
    needs:
      [
        lint-and-format,
        test-api,
        test-web,
        test-regression,
        test-e2e,
        build,
        docker-build-test,
        security-scan,
      ]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Check all job statuses
        run: |
          is_ok() {
            [[ "$1" == "success" || "$1" == "skipped" ]]
          }

          if ! is_ok "${{ needs.lint-and-format.result }}" || \
             ! is_ok "${{ needs.test-api.result }}" || \
             ! is_ok "${{ needs.test-web.result }}" || \
             ! is_ok "${{ needs.test-regression.result }}" || \
             ! is_ok "${{ needs.test-e2e.result }}" || \
             ! is_ok "${{ needs.build.result }}" || \
             ! is_ok "${{ needs.docker-build-test.result }}" || \
             ! is_ok "${{ needs.security-scan.result }}"; then
            echo "❌ Some required checks failed"
            exit 1
          fi

          echo "✅ All required checks passed"

      - name: Create check summary
        run: |
          echo "## CI Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint & Format**: ${{ needs.lint-and-format.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API Tests**: ${{ needs.test-api.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Web Tests**: ${{ needs.test-web.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Regression Tests**: ${{ needs.test-regression.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **E2E Tests**: ${{ needs.test-e2e.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Build**: ${{ needs.docker-build-test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Scan**: ${{ needs.security-scan.result }}" >> $GITHUB_STEP_SUMMARY
