name: Security Scanning

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '22.x'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (production only)
        id: npm-audit-prod
        run: |
          echo "## Production Dependencies Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --omit=dev --audit-level=moderate --json > audit-prod.json || true
          
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-prod.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-prod.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-prod.json)
          
          echo "- **Critical**: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- **High**: $HIGH" >> $GITHUB_STEP_SUMMARY
          echo "- **Moderate**: $MODERATE" >> $GITHUB_STEP_SUMMARY
          
          # Only fail on CRITICAL vulnerabilities
          # HIGH vulnerabilities in NestJS ecosystem (multer, lodash) have no available fix
          # These are transitive dependencies - tracked in GitHub Security tab
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical severity vulnerabilities in production dependencies"
            exit 1
          fi
          
          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::Found $HIGH high severity vulnerabilities (NestJS ecosystem - no fix available)"
          fi

      - name: Run npm audit (all dependencies)
        id: npm-audit-all
        run: |
          echo "## All Dependencies Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high --json > audit-all.json || true
          
          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-all.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-all.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-all.json)
          LOW=$(jq '.metadata.vulnerabilities.low // 0' audit-all.json)
          
          echo "- **Critical**: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- **High**: $HIGH" >> $GITHUB_STEP_SUMMARY
          echo "- **Moderate**: $MODERATE" >> $GITHUB_STEP_SUMMARY
          echo "- **Low**: $LOW" >> $GITHUB_STEP_SUMMARY
          
          echo "⚠️ Dev dependencies have vulnerabilities but do not block deployment" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: |
            audit-prod.json
            audit-all.json
          retention-days: 30

  container-scan:
    name: Container Image Security Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      security-events: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/api/Dockerfile
          push: false
          load: true
          tags: quiz-api:scan
          target: production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: 'quiz-api:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy vulnerability scanner (JSON)
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: 'quiz-api:scan'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Generate security summary
        if: always()
        run: |
          echo "## Container Security Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ -f "trivy-results.json" ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)
            
            echo "- **Critical**: $CRITICAL" >> $GITHUB_STEP_SUMMARY
            echo "- **High**: $HIGH" >> $GITHUB_STEP_SUMMARY
            echo "- **Medium**: $MEDIUM" >> $GITHUB_STEP_SUMMARY
            
            # Only fail on CRITICAL container vulnerabilities
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::Found $CRITICAL critical container vulnerabilities"
              exit 1
            fi
            
            if [ "$HIGH" -gt 0 ]; then
              echo "::warning::Found $HIGH high severity container vulnerabilities"
            fi
          fi

      - name: Upload container scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-scan-results
          path: trivy-results.*
          retention-days: 30

  # NOTE: CodeQL removed - using GitHub's default CodeQL setup instead
  # This avoids conflict: "CodeQL analyses from advanced configurations cannot be processed when the default setup is enabled"

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scanning (Push)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.sha }}
          extra_args: --debug --only-verified

      - name: TruffleHog Secret Scanning (Pull Request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: TruffleHog Secret Scanning (Schedule/Manual)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified --since-commit HEAD~50

  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, container-scan, secrets-scan]
    if: always()
    permissions:
      contents: read
    
    steps:
      - name: Check all security scans
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependency Scan**: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container Scan**: ${{ needs.container-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Scanning**: Handled by GitHub Default Setup" >> $GITHUB_STEP_SUMMARY
          echo "- **Secrets Scan**: ${{ needs.secrets-scan.result }}" >> $GITHUB_STEP_SUMMARY
          
          # Check dependency and secrets scans (container scan may be skipped on schedule)
          FAILED=false
          
          if [ "${{ needs.dependency-scan.result }}" != "success" ]; then
            FAILED=true
          fi
          
          if [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            FAILED=true
          fi
          
          # Container scan is skipped on schedule events - don't fail if skipped
          if [ "${{ needs.container-scan.result }}" != "success" ] && [ "${{ needs.container-scan.result }}" != "skipped" ]; then
            FAILED=true
          fi
          
          if [ "$FAILED" = "true" ]; then
            echo "::error::One or more security scans failed"
            exit 1
          fi
          
          echo "✅ All security scans passed" >> $GITHUB_STEP_SUMMARY
