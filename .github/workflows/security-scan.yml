name: Security Scanning

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '22.x'

jobs:
  dependency-scan:
    name: dependency-scan
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (production only)
        id: npm-audit-prod
        run: |
          echo "## Production Dependencies Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --omit=dev --audit-level=moderate --json > audit-prod.json || true

          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-prod.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-prod.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-prod.json)

          echo "- **Critical**: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- **High**: $HIGH" >> $GITHUB_STEP_SUMMARY
          echo "- **Moderate**: $MODERATE" >> $GITHUB_STEP_SUMMARY

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical severity vulnerabilities in production dependencies"
            exit 1
          fi

          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::Found $HIGH high severity vulnerabilities in production dependencies"
          fi

      - name: Run npm audit (all dependencies)
        id: npm-audit-all
        run: |
          echo "## All Dependencies Audit" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high --json > audit-all.json || true

          CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-all.json)
          HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-all.json)
          MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-all.json)
          LOW=$(jq '.metadata.vulnerabilities.low // 0' audit-all.json)

          echo "- **Critical**: $CRITICAL" >> $GITHUB_STEP_SUMMARY
          echo "- **High**: $HIGH" >> $GITHUB_STEP_SUMMARY
          echo "- **Moderate**: $MODERATE" >> $GITHUB_STEP_SUMMARY
          echo "- **Low**: $LOW" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-reports
          path: |
            audit-prod.json
            audit-all.json
          retention-days: 30

  container-scan:
    name: container-scan
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/api/Dockerfile
          push: false
          load: true
          tags: quiz-api:scan
          target: production
          cache-from: type=gha,scope=docker-${{ github.ref }}
          cache-to: type=gha,mode=max,scope=docker-${{ github.ref }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'quiz-api:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

      - name: Run Trivy vulnerability scanner (JSON output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'quiz-api:scan'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
        continue-on-error: true

      - name: Generate security summary
        if: always()
        run: |
          echo "## Container Security Scan Results" >> $GITHUB_STEP_SUMMARY
          if [ -f "trivy-results.json" ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json)
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json)
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json)

            echo "- **Critical**: $CRITICAL" >> $GITHUB_STEP_SUMMARY
            echo "- **High**: $HIGH" >> $GITHUB_STEP_SUMMARY
            echo "- **Medium**: $MEDIUM" >> $GITHUB_STEP_SUMMARY

            if [ "$CRITICAL" -gt 0 ]; then
              echo "::error::Found $CRITICAL critical vulnerabilities in container image"
              exit 1
            fi
          else
            echo "No scan results available" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload container scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-scan-results
          path: trivy-results.*
          retention-days: 30

  code-scanning:
    name: code-scanning
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      checks: read

    steps:
      - name: Verify default CodeQL checks
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request?.head?.sha || context.sha;
            const timeoutSeconds = 15 * 60;
            const intervalMs = 15000;
            const start = Date.now();
            const okConclusions = new Set(["success", "neutral", "skipped"]);
            const matchesCodeqlCheck = (name) => /^Analyze \(/.test(name) || name === "CodeQL";

            while ((Date.now() - start) / 1000 < timeoutSeconds) {
              const allRuns = await github.paginate(github.rest.checks.listForRef, {
                owner,
                repo,
                ref,
                per_page: 100,
              });

              const codeqlRuns = allRuns.filter((run) => matchesCodeqlCheck(run.name));
              if (codeqlRuns.length === 0) {
                core.info("No default CodeQL checks found yet. Waiting...");
                await new Promise((resolve) => setTimeout(resolve, intervalMs));
                continue;
              }

              const failing = codeqlRuns.filter(
                (run) => run.status === "completed" && !okConclusions.has(run.conclusion || ""),
              );
              if (failing.length > 0) {
                core.setFailed(
                  `Default CodeQL checks failed: ${failing
                    .map((run) => `${run.name}=${run.conclusion}`)
                    .join(", ")}`,
                );
                return;
              }

              const pending = codeqlRuns.filter((run) => run.status !== "completed");
              if (pending.length === 0) {
                core.info(
                  `Default CodeQL checks completed successfully: ${codeqlRuns
                    .map((run) => `${run.name}=${run.conclusion}`)
                    .join(", ")}`,
                );
                return;
              }

              core.info(
                `Waiting for default CodeQL checks to complete: ${pending
                  .map((run) => run.name)
                  .join(", ")}`,
              );
              await new Promise((resolve) => setTimeout(resolve, intervalMs));
            }

            core.setFailed(
              "Timed out waiting for default CodeQL checks. Ensure default setup is enabled and running.",
            );
  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scanning
        uses: trufflesecurity/trufflehog@v3.93.5
        with:
          path: ./
          base: ${{ github.event.repository.default_branch || 'main' }}
          head: HEAD
          extra_args: --debug --only-verified

  security-summary:
    name: security-summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, container-scan, code-scanning, secrets-scan]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Check all security scans
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Dependency Scan**: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container Scan**: ${{ needs.container-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Scanning**: ${{ needs.code-scanning.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Secrets Scan**: ${{ needs.secrets-scan.result }}" >> $GITHUB_STEP_SUMMARY

          is_ok() {
            [[ "$1" == "success" || "$1" == "skipped" ]]
          }

          if ! is_ok "${{ needs.dependency-scan.result }}" || \
             ! is_ok "${{ needs.container-scan.result }}" || \
             ! is_ok "${{ needs.code-scanning.result }}" || \
             ! is_ok "${{ needs.secrets-scan.result }}"; then
            echo "::error::One or more security scans failed"
            exit 1
          fi

          echo "All security scans passed" >> $GITHUB_STEP_SUMMARY
