name: Deploy Web to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - 'docker/web/**'
      - 'libs/shared/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - development
          - production
        default: 'production'

env:
  NODE_VERSION: '22.x'
  REGISTRY_NAME: acrquestionnaireprod
  IMAGE_NAME: quiz-web
  RESOURCE_GROUP: rg-questionnaire-prod
  CONTAINER_APP_NAME: ca-questionnaire-web-prod

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build and Deploy Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_NAME }}.azurecr.io
          username: ${{ secrets.AZURE_ACR_USERNAME }}
          password: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_URL=
            VITE_MICROSOFT_CLIENT_ID=${{ secrets.VITE_MICROSOFT_CLIENT_ID }}
            VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          cache-from: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:buildcache,mode=max
          target: production

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          imageToDeploy: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          registryUrl: ${{ env.REGISTRY_NAME }}.azurecr.io
          registryUsername: ${{ secrets.AZURE_ACR_USERNAME }}
          registryPassword: ${{ secrets.AZURE_ACR_PASSWORD }}

      - name: Verify deployment
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          
          echo "Application URL: https://${APP_URL}"
          
          # Wait for app to be ready
          ATTEMPT=1
          MAX_ATTEMPTS=10
          until [ "$ATTEMPT" -gt "$MAX_ATTEMPTS" ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${APP_URL}")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Deployment successful - Web app is responding"
              echo "Application is available at: https://${APP_URL}"
              break
            fi
            echo "Health check attempt ${ATTEMPT}/${MAX_ATTEMPTS} returned ${HTTP_STATUS}, retrying..."
            ATTEMPT=$((ATTEMPT + 1))
            sleep 10
          done

          if [ "$ATTEMPT" -gt "$MAX_ATTEMPTS" ]; then
            echo "❌ Deployment verification failed after retries"
            exit 1
          fi
          
          # Verify OAuth callback routes are accessible
          echo "Verifying OAuth callback routes..."
          OAUTH_MS=$(curl -s -o /dev/null -w "%{http_code}" "https://${APP_URL}/auth/callback/microsoft")
          OAUTH_GOOGLE=$(curl -s -o /dev/null -w "%{http_code}" "https://${APP_URL}/auth/callback/google")
          
          if [ "$OAUTH_MS" = "200" ] && [ "$OAUTH_GOOGLE" = "200" ]; then
            echo "✅ OAuth callback routes are accessible"
          else
            echo "⚠️ OAuth callback routes returned: Microsoft=$OAUTH_MS, Google=$OAUTH_GOOGLE"
          fi
          
          # Verify API proxy is working
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${APP_URL}/api/v1/health")
          if [ "$API_STATUS" = "200" ]; then
            echo "✅ API proxy is working"
          else
            echo "⚠️ API proxy returned: $API_STATUS"
          fi

      - name: Create deployment summary
        if: always()
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            -o tsv)
          
          echo "## Web Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${APP_URL}" >> $GITHUB_STEP_SUMMARY
          echo "- **Resource Group**: ${{ env.RESOURCE_GROUP }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Container App**: ${{ env.CONTAINER_APP_NAME }}" >> $GITHUB_STEP_SUMMARY
