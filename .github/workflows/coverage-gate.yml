name: Code Coverage Gate

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  pull-requests: write

env:
  NODE_VERSION: '22.x'
  COVERAGE_THRESHOLD_BRANCHES: 50
  COVERAGE_THRESHOLD_LINES: 50
  COVERAGE_THRESHOLD_FUNCTIONS: 50
  COVERAGE_THRESHOLD_STATEMENTS: 50

jobs:
  coverage-check:
    name: Code Coverage Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: questionnaire_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Sync database schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
        run: npx prisma db push --skip-generate

      - name: Run tests with coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/questionnaire_test?schema=public
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret
          JWT_REFRESH_SECRET: test-refresh-secret
        run: npm run test:cov -- --filter=api

      - name: Parse coverage summary
        id: coverage
        run: |
          if [ ! -f "apps/api/coverage/coverage-summary.json" ]; then
            echo "::error::Coverage report not found"
            exit 1
          fi
          
          BRANCHES=$(jq '.total.branches.pct' apps/api/coverage/coverage-summary.json)
          LINES=$(jq '.total.lines.pct' apps/api/coverage/coverage-summary.json)
          FUNCTIONS=$(jq '.total.functions.pct' apps/api/coverage/coverage-summary.json)
          STATEMENTS=$(jq '.total.statements.pct' apps/api/coverage/coverage-summary.json)
          
          echo "branches=$BRANCHES" >> $GITHUB_OUTPUT
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "functions=$FUNCTIONS" >> $GITHUB_OUTPUT
          echo "statements=$STATEMENTS" >> $GITHUB_OUTPUT
          
          echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage | Threshold | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          check_threshold() {
            METRIC=$1
            VALUE=$2
            THRESHOLD=$3
            if (( $(echo "$VALUE >= $THRESHOLD" | bc -l) )); then
              echo "| $METRIC | ${VALUE}% | ${THRESHOLD}% | ✅ PASS |" >> $GITHUB_STEP_SUMMARY
              return 0
            else
              echo "| $METRIC | ${VALUE}% | ${THRESHOLD}% | ❌ FAIL |" >> $GITHUB_STEP_SUMMARY
              return 1
            fi
          }
          
          FAILED=0
          check_threshold "Branches" "$BRANCHES" "${{ env.COVERAGE_THRESHOLD_BRANCHES }}" || FAILED=1
          check_threshold "Lines" "$LINES" "${{ env.COVERAGE_THRESHOLD_LINES }}" || FAILED=1
          check_threshold "Functions" "$FUNCTIONS" "${{ env.COVERAGE_THRESHOLD_FUNCTIONS }}" || FAILED=1
          check_threshold "Statements" "$STATEMENTS" "${{ env.COVERAGE_THRESHOLD_STATEMENTS }}" || FAILED=1
          
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $FAILED -eq 1 ]; then
            echo "❌ **Coverage check FAILED** - One or more metrics below threshold" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ **Coverage check PASSED** - All metrics meet or exceed thresholds" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branches = '${{ steps.coverage.outputs.branches }}';
            const lines = '${{ steps.coverage.outputs.lines }}';
            const functions = '${{ steps.coverage.outputs.functions }}';
            const statements = '${{ steps.coverage.outputs.statements }}';
            
            const thresholdBranches = ${{ env.COVERAGE_THRESHOLD_BRANCHES }};
            const thresholdLines = ${{ env.COVERAGE_THRESHOLD_LINES }};
            const thresholdFunctions = ${{ env.COVERAGE_THRESHOLD_FUNCTIONS }};
            const thresholdStatements = ${{ env.COVERAGE_THRESHOLD_STATEMENTS }};
            
            const checkMark = (value, threshold) => parseFloat(value) >= threshold ? '✅' : '❌';
            
            const comment = `## 📊 Code Coverage Report
            
            | Metric | Coverage | Threshold | Status |
            |--------|----------|-----------|--------|
            | Branches | ${branches}% | ${thresholdBranches}% | ${checkMark(branches, thresholdBranches)} |
            | Lines | ${lines}% | ${thresholdLines}% | ${checkMark(lines, thresholdLines)} |
            | Functions | ${functions}% | ${thresholdFunctions}% | ${checkMark(functions, thresholdFunctions)} |
            | Statements | ${statements}% | ${thresholdStatements}% | ${checkMark(statements, thresholdStatements)} |
            
            ${parseFloat(branches) >= thresholdBranches && parseFloat(lines) >= thresholdLines && parseFloat(functions) >= thresholdFunctions && parseFloat(statements) >= thresholdStatements ? '✅ All coverage thresholds met!' : '❌ Some coverage thresholds not met. Please add more tests.'}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: apps/api/coverage/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./apps/api/coverage/coverage-final.json
          flags: api
          name: api-coverage
          fail_ci_if_error: false
        continue-on-error: true
