name: PR Size Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            
            // Get all PR files with pagination
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });
            
            // Patterns for files excluded from size counting
            const excludedPatterns = [
              // Lock files and dependency manifests
              'package-lock.json',
              'yarn.lock',
              'pnpm-lock.yaml',
              // Build output and coverage
              'dist/',
              'build/',
              'coverage/',
              // Snapshots
              '.snap',
              // Documentation
              '.md',
              // GitHub configuration and workflows
              '.github/',
              // Infrastructure / Terraform
              'infrastructure/',
              // Prisma migrations (auto-generated)
              'prisma/migrations/',
              // Docker configuration
              'docker/',
              // End-to-end test fixtures
              'e2e/',
              // Configuration files
              '.prettierrc',
              '.eslintrc',
              '.editorconfig',
              '.gitattributes',
              'turbo.json',
              'jest.config',
              'tsconfig',
              '.env.example',
            ];
            
            // Calculate total changes (only production-relevant code)
            let additions = 0;
            let deletions = 0;
            let skippedFiles = 0;
            
            for (const file of files) {
              const excluded = excludedPatterns.some(p => file.filename.includes(p));
              if (excluded) {
                skippedFiles++;
                continue;
              }
              additions += file.additions;
              deletions += file.deletions;
            }
            
            const totalChanges = additions + deletions;
            
            // Size thresholds (based on DORA research)
            const SMALL = 100;
            const MEDIUM = 200;
            const LARGE = 300;
            const MAX = 500;
            
            let label, message, emoji;
            
            if (totalChanges <= SMALL) {
              label = 'size/S';
              emoji = '🟢';
              message = `Small PR (${totalChanges} lines) - Excellent for review quality!`;
            } else if (totalChanges <= MEDIUM) {
              label = 'size/M';
              emoji = '🟡';
              message = `Medium PR (${totalChanges} lines) - Good size for thorough review.`;
            } else if (totalChanges <= LARGE) {
              label = 'size/L';
              emoji = '🟠';
              message = `Large PR (${totalChanges} lines) - Consider splitting if possible.`;
            } else if (totalChanges <= MAX) {
              label = 'size/XL';
              emoji = '🔴';
              message = `Extra Large PR (${totalChanges} lines) - Review quality may suffer. Please consider splitting.`;
            } else {
              label = 'size/XXL';
              emoji = '⛔';
              message = `PR too large (${totalChanges} lines > ${MAX}). Split required for proper review.`;
            }
            
            // Create comment
            const body = `## ${emoji} PR Size Check
            
            **Counted changes:** ${totalChanges} lines (+${additions} / -${deletions})
            **Files changed:** ${files.length} (${skippedFiles} excluded from count)
            
            ${message}
            
            ### Size Guidelines
            | Size | Lines | Review Quality |
            |------|-------|---------------|
            | 🟢 Small | < 100 | Excellent |
            | 🟡 Medium | 100-200 | Good |
            | 🟠 Large | 200-300 | Acceptable |
            | 🔴 XL | 300-500 | Reduced |
            | ⛔ XXL | > 500 | Split Required |
            
            *70% of PRs should be under 200 lines for optimal review quality.*`;

            const isForkPr = context.payload.pull_request.head.repo.full_name !== `${owner}/${repo}`;
            const isDependabotPr = context.actor === 'dependabot[bot]';
            
            if (isForkPr || isDependabotPr) {
              core.info('Skipping PR comment and label due to restricted token context.');
            } else {
              // Post comment (permission can still be restricted by repo policy)
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pull_number,
                  body
                });
              } catch (e) {
                core.warning(`Could not create PR comment: ${e.message}`);
              }
              
              // Add label
              try {
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: pull_number,
                  labels: [label]
                });
              } catch (e) {
                core.warning(`Could not add label: ${e.message}`);
              }
            }
            
            // Fail if XXL (over 500 lines)
            if (totalChanges > MAX) {
              core.setFailed(`PR is too large (${totalChanges} > ${MAX} lines). Please split into smaller PRs.`);
            }
