name: PR Size Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-size:
    if: github.event.pull_request.head.repo.fork == false
    name: Check PR Size
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/pr-size-check.js');
            await script({github, context, core});

  pr-size-status:
    name: PR Size Status
    permissions: {}
    runs-on: ubuntu-latest
    needs: [pr-size]
    if: always()

    steps:
      - name: Check PR size status
        run: |
          if [[ "${{ needs.pr-size.result }}" == "success" || "${{ needs.pr-size.result }}" == "skipped" ]]; then
            echo "PR size check passed or skipped"
            exit 0
          else
            echo "::error::PR size check failed with status: ${{ needs.pr-size.result }}"
            exit 1
          fi
