version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    versioning-strategy: "lockfile-only"
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    versioning-strategy: "lockfile-only"
    open-pull-requests-limit: 5
  - package-ecosystem: "npm"
    directory: "/apps/cli"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    versioning-strategy: "lockfile-only"
    open-pull-requests-limit: 5
