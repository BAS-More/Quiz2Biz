# SonarCloud Configuration for Quiz2Biz
# Documentation: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/

sonar.projectKey=BAS-More_Quiz-to-build
sonar.organization=bas-more
sonar.projectName=Quiz2Biz

# Source configuration
sonar.sources=apps/api/src,apps/web/src,apps/cli/src,libs
sonar.tests=apps/api/src,apps/web/src,apps/cli/src/__tests__
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/*.test.ts,**/migrations/**

# TypeScript configuration
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage configuration
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info,apps/cli/coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts,**/*.test.ts,**/test/**,**/__tests__/**

# Quality Gate
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8
